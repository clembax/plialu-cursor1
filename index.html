<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLIALU | Expertise Métallique</title>
    <meta name="description" content="Façonnage métallique sur mesure en Rhône-Alpes. Bureau d'études intégré, pliage CNC, thermolaquage certifié QUALICOAT. Devis technique sous 48h." />
    <meta name="robots" content="index, follow" />
    <link rel="icon" type="image/png" href="/Favicon-b.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #071318;
            color: rgba(255, 255, 255, 0.78);
        }

        /* --- Font Override for Titles --- */
        h1, h2, h3 {
            font-family: 'Space Grotesk', sans-serif;
        }

        /* --- Section System (Sharp Transitions) --- */
        .section--dark {
            position: relative;
            background-color: #071318;
        }

        .section--light {
            position: relative;
            background-color: #F0F4F6;
            color: #0E2A33;
            /* Suble depth shadow to make light sections appear "below" dark ones */
            box-shadow: 
                inset 0 15px 25px -20px rgba(0, 0, 0, 0.15),
                inset 0 -15px 25px -20px rgba(0, 0, 0, 0.15);
        }

        /* --- Nested Elements Overrides for LIGHT sections --- */
        .section--light h1, .section--light h2, .section--light h3, .section--light h4 {
            color: #0E2A33;
        }
        .section--light p {
            color: rgba(14, 42, 51, 0.75);
        }

        .text-shadow {
            text-shadow: 0 2px 20px rgba(0,0,0,0.6);
        }
        
        @keyframes fadeInOnly {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-fade-in {
            animation: fadeInOnly 0.3s ease-out forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up {
            animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        .selection-brand::selection {
            background-color: rgba(226, 253, 72, 0.3);
            color: white;
        }

        /* Utility for horizontal process summary */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .scroll-snap-x {
            scroll-snap-type: x mandatory;
        }
        .scroll-snap-align-start {
            scroll-snap-align: start;
        }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body class="antialiased selection-brand overflow-x-hidden">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
