<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demande envoyée avec succès | PLIALU</title>
  <style>
    :root {
      color-scheme: dark;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #0E2A33;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #ffffff;
    }
    .container {
      max-width: 520px;
      width: 100%;
      padding: 1.75rem;
    }
    .card {
      background: rgba(7, 19, 24, 0.9);
      border-radius: 1.75rem;
      padding: 3.5rem 3.5rem 3.25rem;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      text-align: center;
    }
    .logo {
      display: flex;
      justify-content: center;
      margin-bottom: 2rem;
    }
    .success-icon {
      width: 64px;
      height: 64px;
      border-radius: 999px;
      background-color: #E2FD48;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px auto;
    }
    .success-icon span {
      color: #0E2A33;
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }
    .logo img {
      height: 32px;
    }
    h1 {
      font-size: 1.9rem;
      line-height: 1.2;
      margin-bottom: 0.75rem;
      font-weight: 800;
    }
    p.subtitle {
      font-size: 0.95rem;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.75);
      margin-bottom: 0.75rem;
    }
    p.reassurance {
      font-size: 0.875rem;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .button-wrapper {
      display: flex;
      justify-content: center;
    }
    a.button {
      display: inline-block;
      padding: 0.9rem 2.5rem;
      border-radius: 999px;
      background-color: #E2FD48;
      color: #0E2A33;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
      box-shadow: 0 18px 40px rgba(226, 253, 72, 0.25);
    }
    a.button:hover {
      background-color: #d4ed3f;
      transform: translateY(-1px);
      box-shadow: 0 22px 50px rgba(226, 253, 72, 0.3);
    }
    a.button:active {
      transform: translateY(0);
      box-shadow: 0 10px 26px rgba(226, 253, 72, 0.22);
    }
    @media (max-width: 640px) {
      .container {
        padding: 1.5rem;
      }
      .card {
        padding: 2.75rem 1.75rem 2.5rem;
      }
      h1 {
        font-size: 1.6rem;
      }
      p.subtitle {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="card" aria-labelledby="success-title">
      <div class="logo">
        <img
          src="https://res.cloudinary.com/dyiup6v5x/image/upload/v1771582757/Logo_Blanc_Plialu_ssatk6.svg"
          alt="PLIALU"
        />
      </div>
      <div class="success-icon">
        <span>✓</span>
      </div>
      <h1 id="success-title">Demande envoyée avec succès</h1>
      <p class="subtitle">Nous reviendrons vers vous sous 24h ouvrées.</p>
      <p class="reassurance">Un commercial vous contactera par email ou téléphone.</p>
      <div class="button-wrapper">
        <a href="/" class="button">Retour au site</a>
      </div>
    </section>
  </main>
</body>
</html>
